<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/auth.js" defer></script>
</head>
<body>
    <header>
        <h1>ROBOCHAT</h1>
        <a href="./login.html">Login</a>
    </header>
    <main class="registerFormMain">
        <form class="registerForm" id="registerForm" action="">

            <label for="NicknameEnter"> Логін</label>
            <input name="NicknameEnter" type="text" placeholder="Логін">

            <label for="passwordEnter"> Пароль</label>
            <input name="passwordEnter" type="text" placeholder="Пароль">

            <label for="passwordRepeat"> Повторіть пароль</label>
            <input name="passwordRepeat" type="text" placeholder="Повторіть пароль">

            <button type="submit" class="registerButtonSubmit">submit</button>
        </form>
    </main>
</body>
</html>
